# Single-host evaluation deployment (v1). Role boundaries are kept clean so
# ds/am/idm/gateway can later be split into separate groups without rewriting
# tasks.
[ping]
# ansible-core cannot run on the Windows control node, so the playbook is
# copied to the VM and run there against itself (see memory/G-notes).
192.168.1.4 ansible_user=rockylinux ansible_connection=local
